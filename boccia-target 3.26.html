<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BOCCIA TARGET</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&display=swap');
:root {
  --red:#ff3b3b; --blue:#3b9eff; --gold:#ffc947; --green:#39d98a;
  --dark:#080b10; --panel:#0f1318; --card:#141920; --border:#1e2530;
  --text:#dde4ef; --muted:#5a6478; --court:#0a1f0f;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--dark);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}

.hdr{
  background:var(--panel);border-bottom:1px solid var(--border);
  padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.logo{font-family:'Bebas Neue';font-size:22px;letter-spacing:3px;color:var(--gold);}
.logo span{font-size:11px;color:var(--muted);font-family:'Noto Sans JP';font-weight:400;letter-spacing:0;}

/* STEPS */
.steps{display:flex;padding:10px 16px;gap:6px;background:var(--panel);border-bottom:1px solid var(--border);}
.step{
  flex:1;padding:6px 4px;text-align:center;border-radius:8px;
  font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);
  border:1px solid var(--border);background:var(--card);transition:all 0.2s;
}
.step.active{border-color:var(--gold);color:var(--gold);background:rgba(255,201,71,0.08);}
.step.done{border-color:var(--green);color:var(--green);background:rgba(57,217,138,0.08);}

/* PAGE */
.page{display:none;} .page.on{display:block;}

/* ===== STEP1: PATTERN SELECT ===== */
.pattern-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;padding:14px 16px;
}
.pattern-card{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:12px;overflow:hidden;cursor:pointer;transition:all 0.15s;
}
.pattern-card:active{transform:scale(0.97);}
.pattern-card.sel{border-color:var(--gold);}
.pattern-mini{
  position:relative;width:100%;padding-bottom:55%;
  background:var(--court);border-bottom:1px solid var(--border);
}
.pattern-mini svg{position:absolute;inset:0;width:100%;height:100%;}
.pattern-label{
  padding:6px 8px;font-size:11px;font-weight:700;
  color:var(--muted);text-align:center;line-height:1.3;
}
.pattern-card.sel .pattern-label{color:var(--gold);}

.next-btn{
  width:calc(100% - 32px);margin:4px 16px 16px;padding:14px;
  background:linear-gradient(135deg,#1a1200,#0f1318);
  border:1.5px solid var(--gold);border-radius:12px;
  color:var(--gold);font-family:'Bebas Neue';font-size:18px;letter-spacing:3px;
  cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.next-btn:active{transform:scale(0.98);}
.next-btn:disabled{opacity:0.3;pointer-events:none;}

/* ===== STEP2: COURT TAP ===== */
.court-wrap{padding:12px 16px;}
.court-instruction{
  font-size:12px;color:var(--muted);margin-bottom:8px;
  padding:8px 12px;background:var(--card);border-radius:8px;
  border-left:2px solid var(--gold);line-height:1.6;
}
.court-instruction strong{color:var(--gold);}
.court-container{
  position:relative;width:100%;padding-bottom:54%;
  background:var(--court);border:1.5px solid #1a3525;border-radius:8px;overflow:hidden;
  cursor:crosshair;
}
.court-container::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    linear-gradient(to bottom,transparent 80%,rgba(255,255,255,0.05) 80%,rgba(255,255,255,0.05) 82%,transparent 82%),
    linear-gradient(to right,rgba(255,255,255,0.03) 16.6%,transparent 16.6%,transparent 33.3%,rgba(255,255,255,0.03) 33.3%,transparent 33.3%,transparent 50%,rgba(255,255,255,0.03) 50%,transparent 50%,transparent 66.6%,rgba(255,255,255,0.03) 66.6%,transparent 66.6%,transparent 83.3%,rgba(255,255,255,0.03) 83.3%);
}
.v-line{position:absolute;bottom:19%;left:0;right:0;height:1px;background:rgba(255,255,255,0.08);pointer-events:none;}
.court-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.ball-marker{
  position:absolute;transform:translate(-50%,-50%);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:900;pointer-events:none;z-index:10;
  border:2px solid rgba(255,255,255,0.3);box-shadow:0 2px 6px rgba(0,0,0,0.5);
}
.tap-hint{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:5;
}
.tap-hint-txt{font-size:12px;color:rgba(255,255,255,0.2);text-align:center;line-height:1.7;}
.tap-step-indicator{
  display:flex;gap:8px;margin-top:10px;
}
.tap-step{
  flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);
  background:var(--card);text-align:center;font-size:11px;font-weight:700;color:var(--muted);
  transition:all 0.2s;
}
.tap-step.current{border-color:var(--gold);color:var(--gold);background:rgba(255,201,71,0.08);}
.tap-step.done{border-color:var(--green);color:var(--green);background:rgba(57,217,138,0.08);}

/* ===== STEP3: RESULT ===== */
.result-wrap{padding:12px 16px;}
.result-court-wrap{
  position:relative;width:100%;padding-bottom:54%;
  background:var(--court);border:1.5px solid var(--gold);border-radius:8px;overflow:hidden;margin-bottom:12px;
}
.result-court-wrap::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    linear-gradient(to bottom,transparent 80%,rgba(255,255,255,0.05) 80%,rgba(255,255,255,0.05) 82%,transparent 82%),
    linear-gradient(to right,rgba(255,255,255,0.03) 16.6%,transparent 16.6%,transparent 33.3%,rgba(255,255,255,0.03) 33.3%,transparent 33.3%,transparent 50%,rgba(255,255,255,0.03) 50%,transparent 50%,transparent 66.6%,rgba(255,255,255,0.03) 66.6%,transparent 66.6%,transparent 83.3%,rgba(255,255,255,0.03) 83.3%);
}
.result-svg{position:absolute;inset:0;width:100%;height:100%;}

.tactic-card{
  background:var(--card);border:1.5px solid var(--gold);border-radius:12px;overflow:hidden;margin-bottom:10px;
}
.tactic-top{
  background:rgba(255,201,71,0.1);padding:8px 14px;
  display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,201,71,0.15);
}
.tactic-badge{background:var(--gold);color:var(--dark);font-family:'Bebas Neue';font-size:11px;letter-spacing:2px;padding:2px 10px;border-radius:20px;}
.tactic-type{font-family:'Bebas Neue';font-size:13px;letter-spacing:2px;color:var(--gold);}
.tactic-body{padding:12px 14px;}
.tactic-name{font-family:'Bebas Neue';font-size:26px;letter-spacing:1px;margin-bottom:6px;}
.tactic-action{font-size:14px;font-weight:700;color:var(--text);line-height:1.7;padding:10px 12px;background:rgba(255,255,255,0.03);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;margin-bottom:8px;}
.tactic-why{font-size:12px;color:var(--muted);line-height:1.6;}

.back-btn{
  width:100%;padding:13px;background:var(--card);border:1px solid var(--border);border-radius:12px;
  color:var(--muted);font-family:'Bebas Neue';font-size:14px;letter-spacing:2px;
  cursor:pointer;margin-top:4px;transition:all 0.15s;
}
.back-btn:active{color:var(--text);border-color:var(--text);}
.pb{height:40px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">BOCCIA <span>TARGET</span></div>
</div>

<div class="steps">
  <div class="step active" id="s1">① パターン選択</div>
  <div class="step" id="s2">② 位置調整</div>
  <div class="step" id="s3">③ 投球指示</div>
</div>

<!-- ===== PAGE 1: PATTERN ===== -->
<div class="page on" id="page1">
  <div class="pattern-grid" id="patternGrid"></div>
  <button class="next-btn" id="nextBtn1" disabled onclick="goStep2()">⚡ この配置で位置調整へ</button>
  <div class="pb"></div>
</div>

<!-- ===== PAGE 2: COURT TAP ===== -->
<div class="page" id="page2">
  <div class="court-wrap">
    <div class="court-instruction" id="tapInstruction">
      <strong>① ジャック（白）の位置</strong>をタップしてください
    </div>
    <div class="court-container" id="court2" onclick="courtTap(event)">
      <div class="v-line"></div>
      <svg class="court-svg" id="svg2" viewBox="0 0 100 54" preserveAspectRatio="none"></svg>
      <div class="tap-hint" id="tapHint">
        <div class="tap-hint-txt">ジャックの位置を<br>タップ</div>
      </div>
    </div>
    <div class="tap-step-indicator">
      <div class="tap-step current" id="ts1">① ジャック位置</div>
      <div class="tap-step" id="ts2">② 相手最近接球</div>
      <div class="tap-step" id="ts3">③ 自チーム最近接球</div>
    </div>
  </div>
  <button class="next-btn" id="nextBtn2" disabled onclick="goStep3()" style="margin-top:8px;">⚡ 投球指示を見る</button>
  <div class="pb"></div>
</div>

<!-- ===== PAGE 3: RESULT ===== -->
<div class="page" id="page3">
  <div class="result-wrap">
    <div class="result-court-wrap" id="resultCourtWrap">
      <div class="v-line"></div>
      <svg class="result-svg" id="resultSvg" viewBox="0 0 100 54" preserveAspectRatio="none"></svg>
    </div>
    <div class="tactic-card">
      <div class="tactic-top">
        <span class="tactic-badge">投球指示</span>
        <span class="tactic-type" id="rType"></span>
      </div>
      <div class="tactic-body">
        <div class="tactic-name" id="rName"></div>
        <div class="tactic-action" id="rAction"></div>
        <div class="tactic-why" id="rWhy"></div>
      </div>
    </div>
    <button class="back-btn" onclick="restart()">↩ 最初からやり直す</button>
  </div>
  <div class="pb"></div>
</div>

<script>
// ===== PATTERNS =====
// 8パターン: nearest(my/opp) × jack(corner/center) × order(first/second)
const PATTERNS = [
  { id:'my_corner_first',  label:'自が最近接\nジャック隅\n先行',   nearest:'my',  jack:'corner', order:'first'  },
  { id:'my_corner_second', label:'自が最近接\nジャック隅\n後攻',   nearest:'my',  jack:'corner', order:'second' },
  { id:'my_center_first',  label:'自が最近接\nジャック中央\n先行', nearest:'my',  jack:'center', order:'first'  },
  { id:'my_center_second', label:'自が最近接\nジャック中央\n後攻', nearest:'my',  jack:'center', order:'second' },
  { id:'opp_corner_first', label:'相手が最近接\nジャック隅\n先行', nearest:'opp', jack:'corner', order:'first'  },
  { id:'opp_corner_second',label:'相手が最近接\nジャック隅\n後攻', nearest:'opp', jack:'corner', order:'second' },
  { id:'opp_center_first', label:'相手が最近接\nジャック中央\n先行',nearest:'opp', jack:'center', order:'first'  },
  { id:'opp_center_second',label:'相手が最近接\nジャック中央\n後攻',nearest:'opp', jack:'center', order:'second' },
];

// デフォルト位置（パターンから自動設定）
const DEFAULT_POS = {
  my_corner_first:   { jack:{x:88,y:12}, opp:{x:70,y:20}, my:{x:82,y:18} },
  my_corner_second:  { jack:{x:88,y:12}, opp:{x:72,y:22}, my:{x:84,y:16} },
  my_center_first:   { jack:{x:50,y:30}, opp:{x:60,y:38}, my:{x:46,y:28} },
  my_center_second:  { jack:{x:50,y:30}, opp:{x:62,y:35}, my:{x:48,y:26} },
  opp_corner_first:  { jack:{x:88,y:12}, opp:{x:84,y:16}, my:{x:70,y:24} },
  opp_corner_second: { jack:{x:88,y:12}, opp:{x:84,y:14}, my:{x:72,y:26} },
  opp_center_first:  { jack:{x:50,y:30}, opp:{x:46,y:26}, my:{x:62,y:38} },
  opp_center_second: { jack:{x:50,y:30}, opp:{x:48,y:24}, my:{x:64,y:40} },
};

const TACTICS = {
  my_corner_first: {
    type:'BLOCK', name:'コーナー封鎖',
    action:'ジャックの正面（相手ボックス側）にブロック球を置く。相手からジャックが75%以上隠れる位置が理想。',
    why:'先行＋コーナー最近接は最強の状況。Ball Count Advantageを維持して相手を消耗させる。'
  },
  my_corner_second: {
    type:'BLOCK', name:'隅守り固め',
    action:'ジャックの左右どちらかを塞ぐ。柔らかい球を使ってしっかり止める。相手の投球角度を1方向に絞る。',
    why:'後攻でも隅を守れば防御陣地を作れる。相手の選択肢を狭めることが最優先。'
  },
  my_center_first: {
    type:'BLOCK', name:'多方向ブロック',
    action:'相手ボックス（手前）方向を最優先でブロック。次に左右を塞ぐ。残球が多い今のうちに複数ブロックを重ねる。',
    why:'中央は360度から狙われる。先行の残球優位を使い複数ブロックで封鎖。'
  },
  my_center_second: {
    type:'BLOCK', name:'盾ブロック',
    action:'自チームの最近接球の手前（相手側）にブロック球を置く。KOFFされても弾いた先に別の自球が来る状況を作る。',
    why:'中央後攻でも盾ブロックでKOFFを無力化できる。'
  },
  opp_corner_first: {
    type:'KOFF', name:'隅KOFF奪還',
    action:'硬い球で相手最近接球の横から当てて弾き飛ばす。壁があるので弾いた球は外に出にくい。KOFF後すぐアプローチで最近接を確保。',
    why:'先行でも相手最近接なら即KOFF。残球優位を取り戻すために動く。'
  },
  opp_corner_second: {
    type:'KOFF', name:'緊急KOFF',
    action:'後攻＋相手最近接は最悪の状況。硬い球で直接KOFFか、壁を使ったINOFF（リコシェ）で除去。弾いた後すぐアプローチ。',
    why:'Ball Count Advantageが相手に渡っている。即KOFF以外に選択肢なし。'
  },
  opp_center_first: {
    type:'KOFF', name:'中央KOFF',
    action:'最も投げやすい角度を選んでKOFF。中央は360度から攻撃可能な好機。KOFF後アプローチで最近接奪還。',
    why:'先行の残球優位があるうちに最近接を取り戻す。中央はKOFFしやすい。'
  },
  opp_center_second: {
    type:'KOFF', name:'Fearless KOFF',
    action:'ためらわず硬い球でKOFF。失敗してもアプローチで挽回する覚悟で連続攻撃。英国Fearlessスタイルで積極的に仕掛ける。',
    why:'後攻＋相手最近接＋中央は最悪パターン。積極攻撃しかない。'
  },
};

// ===== STATE =====
let selectedPattern = null;
let tapState = 0; // 0=jack, 1=opp, 2=my
let positions = { jack:null, opp:null, my:null };

// ===== INIT =====
function initPatterns() {
  const grid = document.getElementById('patternGrid');
  grid.innerHTML = PATTERNS.map(p => `
    <div class="pattern-card" id="pc_${p.id}" onclick="selectPattern('${p.id}')">
      <div class="pattern-mini">
        <svg viewBox="0 0 100 54" preserveAspectRatio="none">${miniSvg(p)}</svg>
      </div>
      <div class="pattern-label">${p.label.replace(/\n/g,'<br>')}</div>
    </div>
  `).join('');
}

function miniSvg(p) {
  const pos = DEFAULT_POS[p.id];
  const j = pos.jack, o = pos.opp, m = pos.my;
  // court lines
  let svg = `<line x1="0" y1="43" x2="100" y2="43" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>`;
  // arrow from my to target zone
  if (p.nearest === 'my') {
    // suggest block position
    const tx = j.x + (j.x > 50 ? 8 : -8);
    const ty = j.y + 8;
    svg += `<line x1="${m.x}" y1="${m.y}" x2="${tx}" y2="${ty}" stroke="rgba(255,201,71,0.6)" stroke-width="1.5" stroke-dasharray="2,1" marker-end="url(#arr)"/>`;
    svg += `<circle cx="${tx}" cy="${ty}" r="3" fill="none" stroke="rgba(255,201,71,0.8)" stroke-width="1"/>`;
  } else {
    // suggest koff
    svg += `<line x1="${m.x}" y1="${m.y}" x2="${o.x}" y2="${o.y}" stroke="rgba(255,59,59,0.7)" stroke-width="1.5" marker-end="url(#arr2)"/>`;
  }
  // balls
  svg += `<circle cx="${j.x}" cy="${j.y}" r="4" fill="#f0f0f0"/>`;
  svg += `<text x="${j.x}" y="${j.y+1.5}" text-anchor="middle" dominant-baseline="middle" font-size="3.5" font-weight="900" fill="#333">J</text>`;
  svg += `<circle cx="${o.x}" cy="${o.y}" r="4" fill="#3b9eff"/>`;
  svg += `<text x="${o.x}" y="${o.y+1.5}" text-anchor="middle" dominant-baseline="middle" font-size="3.5" font-weight="900" fill="white">敵</text>`;
  svg += `<circle cx="${m.x}" cy="${m.y}" r="4" fill="#ff3b3b"/>`;
  svg += `<text x="${m.x}" y="${m.y+1.5}" text-anchor="middle" dominant-baseline="middle" font-size="3.5" font-weight="900" fill="white">自</text>`;
  svg += `<defs><marker id="arr" markerWidth="4" markerHeight="4" refX="3" refY="2" orient="auto"><path d="M0,0 L4,2 L0,4 Z" fill="rgba(255,201,71,0.8)"/></marker><marker id="arr2" markerWidth="4" markerHeight="4" refX="3" refY="2" orient="auto"><path d="M0,0 L4,2 L0,4 Z" fill="rgba(255,59,59,0.8)"/></marker></defs>`;
  return svg;
}

function selectPattern(id) {
  selectedPattern = id;
  document.querySelectorAll('.pattern-card').forEach(c => c.classList.remove('sel'));
  document.getElementById('pc_'+id).classList.add('sel');
  document.getElementById('nextBtn1').disabled = false;
  // load default positions
  positions = JSON.parse(JSON.stringify(DEFAULT_POS[id]));
}

// ===== STEP 2 =====
function goStep2() {
  if (!selectedPattern) return;
  setStep(2);
  tapState = 0;
  renderCourt2();
  updateTapUI();
}

function courtTap(e) {
  const court = document.getElementById('court2');
  const rect = court.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width) * 100;
  const y = ((e.clientY - rect.top) / rect.height) * 100;

  if (tapState === 0) { positions.jack = {x,y}; tapState = 1; }
  else if (tapState === 1) { positions.opp = {x,y}; tapState = 2; }
  else if (tapState === 2) { positions.my = {x,y}; tapState = 3; }

  renderCourt2();
  updateTapUI();
  if (tapState >= 3) document.getElementById('nextBtn2').disabled = false;
}

function renderCourt2() {
  const court = document.getElementById('court2');
  court.querySelectorAll('.ball-marker').forEach(b => b.remove());
  document.getElementById('tapHint').style.display = tapState === 0 ? 'flex' : 'none';

  const add = (pos, color, label, size) => {
    if (!pos) return;
    const el = document.createElement('div');
    el.className = 'ball-marker';
    el.style.cssText = `left:${pos.x}%;top:${pos.y}%;width:${size}px;height:${size}px;background:${color};`;
    el.textContent = label;
    court.appendChild(el);
  };
  if (positions.jack) add(positions.jack, '#f0f0f0', 'J', 22);
  if (positions.opp)  add(positions.opp,  '#3b9eff', '敵', 26);
  if (positions.my)   add(positions.my,   '#ff3b3b', '自', 26);
}

function updateTapUI() {
  const steps = ['ts1','ts2','ts3'];
  const labels = ['① ジャック位置','② 相手最近接球','③ 自チーム最近接球'];
  steps.forEach((id,i) => {
    const el = document.getElementById(id);
    el.className = 'tap-step';
    if (i < tapState) el.classList.add('done');
    else if (i === tapState) el.classList.add('current');
    el.textContent = (i < tapState ? '✓ ' : '') + labels[i];
  });
  const instructions = [
    '<strong>① ジャック（白）の位置</strong>をタップしてください',
    '<strong>② 相手チームの最近接球（青）</strong>の位置をタップ',
    '<strong>③ 自チームの最近接球（赤）</strong>の位置をタップ',
    '✅ 配置完了！「投球指示を見る」を押してください'
  ];
  document.getElementById('tapInstruction').innerHTML = instructions[Math.min(tapState,3)];
}

// ===== STEP 3 =====
function goStep3() {
  setStep(3);
  renderResult();
}

function renderResult() {
  const t = TACTICS[selectedPattern];
  const p = PATTERNS.find(p => p.id === selectedPattern);
  const j = positions.jack, o = positions.opp, m = positions.my;

  // Calculate target position
  let targetX, targetY, arrowColor, arrowTarget;

  if (p.nearest === 'my') {
    // BLOCK: suggest position in front of jack (toward opponent boxes)
    const dx = j.x - o.x, dy = j.y - o.y;
    const len = Math.sqrt(dx*dx+dy*dy) || 1;
    targetX = j.x + (dx/len)*8;
    targetY = j.y + (dy/len)*8;
    targetX = Math.max(5, Math.min(95, targetX));
    targetY = Math.max(5, Math.min(95, targetY));
    arrowColor = '#ffc947';
    arrowTarget = { x: targetX, y: targetY };
  } else {
    // KOFF: target is opponent ball
    targetX = o.x;
    targetY = o.y;
    arrowColor = '#ff3b3b';
    arrowTarget = { x: targetX, y: targetY };
  }

  // Render result court
  const svg = document.getElementById('resultSvg');
  const court = document.getElementById('resultCourtWrap');

  // Remove old markers
  court.querySelectorAll('.ball-marker').forEach(b => b.remove());

  // Draw arrow in SVG
  svg.innerHTML = `
    <defs>
      <marker id="arrowGold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="${arrowColor}"/>
      </marker>
    </defs>
    <line x1="${m.x}" y1="${m.y}" x2="${arrowTarget.x}" y2="${arrowTarget.y}"
      stroke="${arrowColor}" stroke-width="1.5" stroke-dasharray="3,1.5"
      marker-end="url(#arrowGold)" opacity="0.9"/>
    ${p.nearest === 'my'
      ? `<circle cx="${targetX}" cy="${targetY}" r="5" fill="none" stroke="${arrowColor}" stroke-width="1.5" opacity="0.9"/>
         <circle cx="${targetX}" cy="${targetY}" r="2" fill="${arrowColor}" opacity="0.6"/>`
      : `<circle cx="${o.x}" cy="${o.y}" r="7" fill="none" stroke="${arrowColor}" stroke-width="1.5" stroke-dasharray="2,1" opacity="0.8"/>`
    }
  `;

  // Add ball markers
  const add = (pos, color, label, size) => {
    if (!pos) return;
    const el = document.createElement('div');
    el.className = 'ball-marker';
    el.style.cssText = `left:${pos.x}%;top:${pos.y}%;width:${size}px;height:${size}px;background:${color};`;
    el.textContent = label;
    court.appendChild(el);
  };
  add(j, '#f0f0f0', 'J', 22);
  add(o, '#3b9eff', '敵', 26);
  add(m, '#ff3b3b', '自', 26);

  // Target marker
  if (p.nearest === 'my') {
    const tEl = document.createElement('div');
    tEl.className = 'ball-marker';
    tEl.style.cssText = `left:${targetX}%;top:${targetY}%;width:28px;height:28px;background:rgba(255,201,71,0.2);border:2px dashed var(--gold);`;
    tEl.textContent = '▶';
    tEl.style.color = 'var(--gold)';
    tEl.style.fontSize = '10px';
    court.appendChild(tEl);
  }

  // Tactic text
  document.getElementById('rType').textContent = t.type;
  document.getElementById('rName').textContent = t.name;

  const dirDesc = p.nearest === 'my'
    ? `⬆ 点線の先（金色の丸）に投球してください`
    : `⬆ 点線の先（赤枠の相手球）を直接狙ってください`;

  document.getElementById('rAction').textContent = dirDesc + '\n\n' + t.action;
  document.getElementById('rAction').style.whiteSpace = 'pre-line';
  document.getElementById('rWhy').textContent = t.why;
}

function restart() {
  selectedPattern = null;
  tapState = 0;
  positions = { jack:null, opp:null, my:null };
  document.querySelectorAll('.pattern-card').forEach(c => c.classList.remove('sel'));
  document.getElementById('nextBtn1').disabled = true;
  document.getElementById('nextBtn2').disabled = true;
  setStep(1);
}

function setStep(n) {
  [1,2,3].forEach(i => {
    document.getElementById('page'+i).classList.toggle('on', i===n);
    const s = document.getElementById('s'+i);
    s.className = 'step';
    if (i < n) s.classList.add('done');
    else if (i === n) s.classList.add('active');
  });
  window.scrollTo({top:0,behavior:'smooth'});
}

initPatterns();
</script>
</body>
</html>
